<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="../Images/Logo/favicon.ico">
    <title>JMyentaku - Mangas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0e1a">

</head>

<body>
    <header>
        
        <div class="logo">
            <a href="../html/index.html">
                <img src="../Images/Logo/JMYentaku7.png" alt="JMyentaku logo">
            </a>
        </div>
        
        <nav>
            <a href="/index.html"><i class="fas fa-home"></i> <span>Home</span></a>
            <a href="anime.html"><i class="fas fa-film"></i> <span>Animes</span></a>
            <a href="manga.html"><i class="fas fa-book-open"></i> <span>Mangas</span></a>
             <a href="myFaves.html"><i class="fas fa-bookmark"></i><span>Faves</span></a>
            <a href="history.html"><i class="fas fa-history"></i> <span>History</span></a>
            <a href="contact.html"><i class="fas fa-envelope"></i> <span>Contact</span></a>
        </nav>

    </header>

    <div class="filters">

        <div class="filter-left">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Search manga...">
            </div>
        </div>

        <div class="filter-right">
            <select id="genre-select">
                <option value="">All Genres</option>
            </select>

            <select id="date-sort">
                <option value="">Date</option>
                <option value="desc">Newest</option>
                <option value="asc">Oldest</option>
            </select>

            <select id="score-sort">
                <option value="">Score</option>
                <option value="desc">desc</option>
                <option value="asc">asc</option>
            </select>
        </div>

    </div>

    <main>
        <div id="anime-list" class="anime-grid"></div>
        <div id="pagination" class="pagination"></div>
    </main>
    
    <footer>
        <p>Copyright &copy; 2026</p>
    </footer>
    

    <script src="../js/events/navActive.js"></script>
    <script type = "module" src="../js/fetchs/paginationFetch.js"></script>
    <script type = "module" src="../js/fetchs/filterFetch.js"></script>
    <script type="module" src="../js/pwa-init.js"></script>
    
</body>
</html>
