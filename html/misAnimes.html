<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Images/Logo/favicon.ico">
    <title>JMyentaku - Mis Animes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <header>
        
        <div class="logo">
            <a href="../html/index.html">
                <img src="../Images/Logo/JMYentaku7.png" alt="JMyentaku logo">
            </a>
        </div>
        
        <nav>
            <a href="index.html">Home</a>
            <a href="Anime.html">Animes</a>
            <a href="manga.html">Mangas</a>
            <a href="misAnimes.html">Mis Animes</a>
            <a href="contacto.html">Contacto</a>
        </nav>        

    </header>

    <div class="filters">

        <div class="filter-left">
            <input type="text" id="search-input" placeholder="Search anime...">
        </div>

        <div class="filter-right">
            <select id="genre-select">
                <option value="">All Genres</option>
            </select>

            <select id="date-sort">
                <option value="">Date</option>
                <option value="desc">Newest</option>
                <option value="asc">Oldest</option>
            </select>

            <select id="score-sort">
                <option value="">Score</option>
                <option value="desc">desc</option>
                <option value="asc">asc</option>
            </select>
        </div>

    </div>


    <main>
        <div id="favorites-list" class="anime-grid"></div>
        <div id="pagination" class="pagination"></div>
    </main>

    <footer>
        <p>Copyright &copy; 2026</p>
    </footer>
    
    <script src="../js/events/navActive.js"></script>
    <script src="../js/events/favoritesPage.js"></script>
    <script src="../js/fetchs/paginationFetch.js"></script>
